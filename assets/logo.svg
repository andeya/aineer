<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="hex-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="hex-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
    <linearGradient id="prompt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#56D364"/>
    </linearGradient>
    <linearGradient id="cursor-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0883E"/>
      <stop offset="100%" stop-color="#DB6D28"/>
    </linearGradient>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <polygon points="256,48 440,154 440,366 256,472 72,366 72,154"
           fill="url(#hex-fill)" stroke="url(#hex-stroke)" stroke-width="5"
           filter="url(#glow-blue)"/>

  <polygon points="256,82 410,172 410,348 256,438 102,348 102,172"
           fill="none" stroke="#21262D" stroke-width="1.5"/>

  <g filter="url(#glow-green)">
    <path d="M 148 196 L 248 260 L 148 324"
          stroke="url(#prompt)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <rect x="278" y="304" width="96" height="18" rx="4" fill="url(#cursor-grad)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
