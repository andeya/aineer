name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Determine binary path
        id: bin
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            echo "path=target/${{ matrix.target }}/release/codineer.exe" >> "$GITHUB_OUTPUT"
            echo "name=codineer.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=target/${{ matrix.target }}/release/codineer" >> "$GITHUB_OUTPUT"
            echo "name=codineer" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="codineer-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "${{ steps.bin.outputs.path }}" "$staging/"
          cp LICENSE README.md "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="codineer-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "${{ steps.bin.outputs.path }}" "$staging/"
          cp LICENSE README.md "$staging/" 2>/dev/null || true
          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codineer-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
